version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pc4-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: pc4-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
