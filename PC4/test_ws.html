<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor WebSocket - SecurityGO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #status { font-weight: bold; margin-bottom: 15px; display: inline-block; padding: 5px 10px; border-radius: 4px; background: #333; }
        .connected { color: #00e676; }
        .disconnected { color: #ff1744; }
        .connecting { color: #ffea00; }
        #log { background: #000; padding: 15px; height: 400px; overflow-y: auto; border-radius: 4px; font-family: 'Consolas', monospace; font-size: 14px; border: 1px solid #333; }
        .log-entry { padding: 8px 0; border-bottom: 1px solid #222; }
        .tag-metrics { color: #00e5ff; font-weight: bold; }
        .tag-pred { color: #ff4081; font-weight: bold; }
        .tag-info { color: #b2ff59; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📡 Monitor en Tiempo Real (WebSocket)</h2>
        <div id="status" class="connecting">⏳ Conectando al servidor...</div>
        <div id="log"></div>
    </div>

    <script>
        const ws = new WebSocket("ws://localhost:8080/ws");
        const log = document.getElementById("log");
        const status = document.getElementById("status");

        ws.onopen = () => {
            status.className = "connected";
            status.innerText = "Conectado y escuchando";
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            const line = document.createElement("div");
            line.className = "log-entry";
            
            const time = new Date().toLocaleTimeString();

            if (msg.tipo === "metricas") {
                line.innerHTML = `[${time}] <span class="tag-metrics">[Métricas]</span> Cluster: ${msg.datos.predicciones_totales} predicciones | Nodos activos: ${msg.datos.nodos.length} | Clientes conectados: ${msg.datos.clientes_ws}`;
            } else if (msg.tipo === "prediccion") {
                const cacheIcon = msg.datos.desde_cache ? "⚡(Caché)" : "🧠(Nodo TCP)";
                line.innerHTML = `[${time}] <span class="tag-pred">[Predicción]</span> Modelo: ${msg.datos.modelo} | Vía: ${cacheIcon} | Tiempo: ${msg.datos.duracion_ms}ms | Res: ${JSON.stringify(msg.datos.resultado)}`;
            } else {
                line.innerHTML = `[${time}] <span class="tag-info">[Sistema]</span> ${msg.datos.mensaje}`;
            }
            
            log.prepend(line);
        };

        ws.onclose = () => {
            status.className = "disconnected";
            status.innerText = "Desconectado del servidor";
        };

        ws.onerror = () => {
            status.className = "disconnected";
            status.innerText = "Error de conexión (¿Está corriendo el servidor?)";
        };
    </script>
</body>
</html>
